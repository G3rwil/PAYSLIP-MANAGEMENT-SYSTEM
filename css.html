<style>

    border: 1px solid #e2e8f0;

    overflow: hidden;
}

}

}

.status-present { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }

.btn-control {

/* Remove Swal Animations for Instant Feel */
.swal2-popup { animation: none !important; border-radius: 24px !important; }
.swal2-backdrop-show { background: rgba(15, 23, 42, 0.6) !important; backdrop-filter: blur(4px); }

.btn-white {
    background: white;
    color: #475569;
    transition: all 0.2s;
}

.btn-white:hover {
    background: #f8fafc;
    border-color: #cbd5e1 !important;
    color: #1e293b;
}

.border-dashed { border-style: dashed !important; }
.hover-shadow:hover { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1) !important; cursor: pointer; }

/* Animation Removal for Instant Feeling */
.swal2-show { animation: none !important; }

.badge-info-soft { background: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd; }

/* Apply blur to the background behind the alert */
.swal-blur-bg {
    backdrop-filter: blur(8px) !important;
    -webkit-backdrop-filter: blur(8px) !important; /* Safari support */
}

/* Ensure the spinner state also keeps the background blurred */
.swal2-backdrop-show.swal-blur-bg {
    background-color: rgba(0, 0, 0, 0.4) !important;
}

  /* --- LOGIN MODERNIZATION --- */

}

}

    color: white;
}
