<script>
  let globalSettings = []; 
  let isAddMode = false;

  window.onload = () => {
    console.log("System Ready. Waiting for login...");
  };

  // ==========================================
  // 1. AUTHENTICATION LOGIC
  // ==========================================
  function handleLogin() {
    const btn = document.querySelector('.btn-primary-gradient');
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;

    if (!user || !pass) {
      Swal.fire("Error", "Please enter credentials", "error");
      return;
    }

    btn.disabled = true; 
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Verifying...';

    google.script.run
      .withSuccessHandler(isValid => {
        btn.disabled = false;
        btn.innerHTML = 'LOG IN TO SYSTEM <i class="bi bi-arrow-right-short ms-2"></i>';

        if (isValid) {
          document.getElementById('loginPage').classList.add('hidden'); 
          document.getElementById('mainDashboard').classList.remove('hidden');
          
          if (typeof initFilters === "function") initFilters(); 
          if (typeof loadSettings === "function") loadSettings();
          
          Swal.fire({ 
            icon: 'success', 
            title: 'Welcome Back!', 
            timer: 1500, 
            showConfirmButton: false 
          });
        } else {
          Swal.fire("Access Denied", "Invalid username or password", "error");
        }
      })
      .withFailureHandler(err => {
        btn.disabled = false;
        btn.innerHTML = 'LOG IN TO SYSTEM <i class="bi bi-arrow-right-short ms-2"></i>';
        Swal.fire("System Error", err.message, "error");
      })
      .checkLogin(user, pass);
  }

  function handleLogout() {
    Swal.fire({
      title: 'Logout?',
      text: "You will be returned to the login screen.",
      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#0d6efd',
      cancelButtonColor: '#64748b',
      confirmButtonText: 'Yes, Logout'
    }).then((result) => {
      if (result.isConfirmed) {
        document.getElementById('mainDashboard').classList.add('hidden');
        document.getElementById('loginPage').classList.remove('hidden');
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        
        Swal.fire({ icon: 'success', title: 'Logged Out', timer: 1000, showConfirmButton: false });
      }
    });
  }

  // ==========================================
  // 2. EMPLOYEE MASTER LIST (NEW UI LOGIC)
  // ==========================================
  
  function smartFilter() {
    const input = document.getElementById('universalSearch');
    const filter = input.value.toUpperCase();
    
    // 1. Identify which tab is currently visible
    const activeTab = document.querySelector('.tab-pane.active');
    if (!activeTab) return;

    // 2. Find the table body inside that active tab
    const tbody = activeTab.querySelector('tbody');
    if (!tbody) return;

    const rows = tbody.getElementsByTagName("tr");

    for (let i = 0; i < rows.length; i++) {
        let rowVisible = false;
        const cells = rows[i].getElementsByTagName("td");
        
        for (let j = 0; j < cells.length; j++) {
            const textValue = cells[j].textContent || cells[j].innerText;
            if (textValue.toUpperCase().indexOf(filter) > -1) {
                rowVisible = true;
                break;
            }
        }
        rows[i].style.display = rowVisible ? "" : "none";
    }
}

  function loadSettings(isSilent = false) {
  const adminBody = document.getElementById('adminBody');
  if (!adminBody) return;

  // Ipakita lang ang spinner kung walang laman ang table (First load)
  if (!isSilent && adminBody.innerHTML.trim() === "") {
    adminBody.innerHTML = '<tr><td colspan="7" class="text-center py-5"><div class="spinner-border text-primary"></div><br>Syncing Master List...</td></tr>';
  }

  google.script.run.withSuccessHandler(settings => {
    globalSettings = settings;
    
    // Update ang badge count
    const badge = document.getElementById('empCountBadge');
    if (badge) badge.innerText = `${settings.length} Records`;
    
    // Generate ang bagong HTML content
    const newRows = settings.map(r => {
      const empId = r[0] || 'N/A';
      const name = r[1] || '---';
      const type = r[4] || 'REGULAR';
      const salary = parseFloat(r[8] || 0);
      const isExempt = r[20] && r[20].toString().toUpperCase() === "EXEMPTED";

      return `
        <tr>
          <td class="ps-4">
            <span class="badge bg-light text-dark border-secondary-subtle">${empId}</span>
          </td>
          <td class="fw-bold text-uppercase">
            ${name}
            ${isExempt ? '<i class="bi bi-shield-fill-check text-success ms-1" title="Exempted from Late"></i>' : ''}
          </td>
          <td>
            <div class="small fw-semibold text-secondary">${r[2] || ''}</div>
            <div class="tiny text-muted">${r[3] || ''}</div>
          </td>
          <td>
            <span class="badge ${type === 'Regular' ? 'bg-primary-subtle text-primary' : 'bg-warning-subtle text-warning'} text-uppercase">
              ${type}
            </span>
          </td>
          <td class="fw-bold text-dark">₱${salary.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
          <td class="text-center">
            <div class="btn-group shadow-sm">
              <button class="btn btn-white btn-sm border" onclick="editEmployee('${r[0]}')" title="Edit">
                <i class="bi bi-pencil-square text-primary"></i>
              </button>
              <button class="btn btn-white btn-sm border" onclick="deleteEmployee('${r[1]}')" title="Delete">
                <i class="bi bi-trash text-danger"></i>
              </button>
            </div>
          </td>
        </tr>`;
    }).join('');

    // ANTI-FLICKER: I-update lang ang table kung may nabago sa data
    if (adminBody.innerHTML !== newRows) {
      adminBody.innerHTML = newRows;
    }

    // Update ang dropdown silently
    const admDropdown = document.getElementById('admName');
    if (admDropdown) {
      const newOptions = '<option value="">-- Select Employee --</option>' + 
                         settings.map(r => `<option value="${r[1]}">${r[1]}</option>`).join('');
      if (admDropdown.innerHTML !== newOptions) {
        admDropdown.innerHTML = newOptions;
      }
    }
  }).getSettingsData();
}

async function showAddEmployeeModal(existingEmp = null) {
  const isEdit = !!existingEmp;
  // Initialize with 21 empty strings to cover Column A (0) to U (20)
  const data = isEdit ? existingEmp : new Array(21).fill("");

  // --- HELPER FUNCTION PARA SA ORAS ---
  const formatTimeForInput = (timeString) => {
    if (!timeString || timeString === "") return "";
    try {
      const date = new Date("2000/01/01 " + timeString);
      if (isNaN(date.getTime())) {
        return timeString.match(/^\d{2}:\d{2}$/) ? timeString : "";
      }
      const hh = date.getHours().toString().padStart(2, '0');
      const mm = date.getMinutes().toString().padStart(2, '0');
      return `${hh}:${mm}`;
    } catch (e) {
      return "";
    }
  };

  const { value: formValues } = await Swal.fire({
    width: '1100px',
    padding: '0',
    background: 'transparent',
    showConfirmButton: false,
    showCloseButton: true,
    html: `
      <style>
        :root { --accent: #6366f1; --bg-dark: #0f172a; --glass: rgba(255, 255, 255, 0.9); }
        .ultra-modal { display: flex; height: 720px; background: var(--glass); backdrop-filter: blur(20px); border-radius: 30px; overflow: hidden; border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 50px 100px -20px rgba(0,0,0,0.3); }
        .analytics-hub { width: 380px; background: var(--bg-dark); color: white; padding: 40px; display: flex; flex-direction: column; }
        .status-badge { background: rgba(99, 102, 241, 0.2); color: #818cf8; padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; width: fit-content; margin-bottom: 20px; }
        .live-card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); margin-top: 20px; }
        .metric-label { color: #94a3b8; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .metric-val { font-size: 1.5rem; font-weight: 700; margin-bottom: 15px; display: block; }
        .mini-chart-bar { height: 8px; background: #1e293b; border-radius: 4px; overflow: hidden; margin: 10px 0; }
        .mini-chart-fill { height: 100%; background: var(--accent); width: 0%; transition: 1s ease-out; }
        .workspace { flex: 1; padding: 50px; text-align: left; overflow-y: auto; display: flex; flex-direction: column; }
        .workspace-header { margin-bottom: 40px; }
        .tab-btn { background: none; border: none; font-weight: 600; color: #94a3b8; padding: 10px 20px; transition: 0.3s; position: relative; }
        .tab-btn.active { color: var(--bg-dark); }
        .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 20px; right: 20px; height: 3px; background: var(--accent); border-radius: 10px; }
        .floating-field { position: relative; margin-bottom: 25px; }
        .floating-field input, .floating-field select { width: 100%; padding: 15px 0; border: none; border-bottom: 2px solid #e2e8f0; background: transparent; font-size: 1rem; transition: 0.3s; }
        .floating-field input:focus { outline: none; border-color: var(--accent); }
        .floating-field label { position: absolute; top: -10px; left: 0; font-size: 0.7rem; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .step-panel { display: none; animation: fadeIn 0.5s ease forwards; }
        .step-panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .pro-btn { padding: 16px 35px; border-radius: 16px; font-weight: 700; border: none; cursor: pointer; transition: 0.3s; }
        .pro-btn-next { background: var(--bg-dark); color: white; }
        .pro-btn-next:hover { transform: scale(1.05); background: #1e293b; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        /* New Exemption Box Style */
        .exempt-box { background: rgba(99, 102, 241, 0.05); border: 1px dashed var(--accent); border-radius: 15px; padding: 15px; margin-bottom: 25px; }
      </style>

      <div class="ultra-modal">
        <div class="analytics-hub">
          <div class="status-badge">${isEdit ? 'RECORD LOCKED' : 'NEW ASSIGNMENT'}</div>
          <h2 class="fw-bold mb-0" id="live-name">---</h2>
          <p id="live-id" class="text-muted small mb-4">Awaiting credentials...</p>
          
          <div class="live-card">
            <span class="metric-label">Estimated Monthly Gross</span>
            <span class="metric-val" id="live-salary">₱ 0.00</span>
            <span class="metric-label">Financial Footprint</span>
            <div class="mini-chart-bar"><div class="mini-chart-fill" id="salary-bar"></div></div>
            <p class="small text-muted mt-2">Deductions impact: <span id="live-impact" class="text-white">0%</span></p>
          </div>

          <div class="mt-4 p-2">
            <div class="d-flex justify-content-between mb-2"><span class="small opacity-50">Department</span><span class="small fw-bold" id="live-dept">---</span></div>
            <div class="d-flex justify-content-between mb-2"><span class="small opacity-50">Position</span><span class="small fw-bold" id="live-pos">---</span></div>
          </div>

          <div class="mt-auto">
             <div class="d-flex align-items-center gap-3 p-3 rounded-4" style="background: rgba(255,255,255,0.05)">
               <div class="bi bi-shield-check-fill text-primary fs-3"></div>
               <div><p class="m-0 small fw-bold">Cloud Sync Active</p><p class="m-0 tiny opacity-50" style="font-size: 0.6rem">All changes recorded to database</p></div>
             </div>
          </div>
        </div>

        <div class="workspace">
          <div class="workspace-header">
            <button class="tab-btn active" id="t1" onclick="jump(1)">Basic Details</button>
            <button class="tab-btn" id="t2" onclick="jump(2)">Compensation</button>
            <button class="tab-btn" id="t3" onclick="jump(3)">Statutory</button>
          </div>

          <form id="proForm">
            <div class="step-panel active" id="p1">
              <div class="row g-4">
                <div class="col-md-6"><div class="floating-field"><label>Employee ID</label><input id="swal-0" value="${data[0]}" ${isEdit ? 'disabled' : ''} onkeyup="calcLive()"></div></div>
                <div class="col-md-6"><div class="floating-field"><label>Employment Type</label><select id="swal-4"><option value="Regular" ${data[4]=='Regular'?'selected':''}>Regular</option><option value="Probationary" ${data[4]=='Probationary'?'selected':''}>Probationary</option></select></div></div>
                <div class="col-12"><div class="floating-field"><label>Full Name</label><input id="swal-1" value="${data[1]}" onkeyup="calcLive()"></div></div>

                <div class="col-12">
                  <div class="exempt-box">
                    <div class="form-check form-switch m-0">
                      <input class="form-check-input" type="checkbox" role="switch" id="swal-20" ${data[20] === 'EXEMPTED' ? 'checked' : ''}>
                      <label class="form-check-label fw-bold small text-primary" for="swal-20">EXEMPT FROM LATE & AUTO-PAY</label>
                    </div>
                  </div>
                </div>

                <div class="col-md-6"><div class="floating-field"><label>Department</label><input id="swal-2" value="${data[2]}" onkeyup="calcLive()"></div></div>
                <div class="col-md-6"><div class="floating-field"><label>Position</label><input id="swal-3" value="${data[3]}" onkeyup="calcLive()"></div></div>
                <div class="col-md-6"><div class="floating-field"><label>Email</label><input id="swal-5" type="email" value="${data[5]}"></div></div>
                
                <div class="col-md-3"><div class="floating-field"><label>Shift Start</label><input type="time" id="swal-6" value="${formatTimeForInput(data[6])}"></div></div>
                <div class="col-md-3"><div class="floating-field"><label>Shift End</label><input type="time" id="swal-7" value="${formatTimeForInput(data[7])}"></div></div>
              </div>
            </div>

            <div class="step-panel" id="p2">
              <div class="row g-4">
                <div class="col-md-6"><div class="floating-field"><label>Per Hour Rate</label><input type="number" id="swal-8" value="${data[8]}" onkeyup="calcLive()"></div></div>
                <div class="col-md-3"><div class="floating-field"><label>Overtime Rate</label><input type="number" id="swal-9" value="${data[9]}"></div></div>
                <div class="col-md-3"><div class="floating-field"><label>Night Diff</label><input type="number" id="swal-10" value="${data[10]}"></div></div>
                <div class="col-md-6"><div class="floating-field"><label>Holiday Premium</label><input type="number" id="swal-11" value="${data[11]}"></div></div>
                <div class="col-md-6"><div class="floating-field"><label>Premium Rate</label><input type="number" id="swal-12" value="${data[12]}"></div></div>
                <div class="col-12"><div class="floating-field"><label>Honorarium</label><input type="number" id="swal-13" value="${data[13]}" onkeyup="calcLive()"></div></div>
              </div>
            </div>

            <div class="step-panel" id="p3">
              <div class="row g-4">
                <div class="col-md-6"><div class="floating-field"><label>Vacation Leave</label><input type="number" id="swal-14" value="${data[14]}"></div></div>
                <div class="col-md-6"><div class="floating-field"><label>Sick Leave</label><input type="number" id="swal-15" value="${data[15]}"></div></div>
                <div class="col-md-3"><div class="floating-field"><label>SSS</label><input type="number" id="swal-16" value="${data[16]}" onkeyup="calcLive()"></div></div>
                <div class="col-md-3"><div class="floating-field"><label>PhilHealth</label><input type="number" id="swal-17" value="${data[17]}" onkeyup="calcLive()"></div></div>
                <div class="col-md-3"><div class="floating-field"><label>Pag-IBIG</label><input type="number" id="swal-18" value="${data[18]}" onkeyup="calcLive()"></div></div>
                <div class="col-md-3"><div class="floating-field"><label>W. Tax</label><input type="number" id="swal-19" value="${data[19]}" onkeyup="calcLive()"></div></div>
              </div>
            </div>
          </form>

          <div class="mt-auto d-flex justify-content-between align-items-center">
            <span class="text-muted small fw-bold" id="step-text">Step 1 of 3</span>
            <div>
              <button class="pro-btn pro-btn-next" id="main-btn" onclick="handleFlow()">Next Segment <i class="bi bi-arrow-right ms-2"></i></button>
            </div>
          </div>
        </div>
      </div>
    `,
    didOpen: () => {
      window.cur = 1;
      window.calcLive = () => {
        const name = document.getElementById('swal-1').value || "New Employee";
        const hourlyRate = parseFloat(document.getElementById('swal-8').value) || 0;
        const honoPerCutoff = parseFloat(document.getElementById('swal-13').value) || 0;
        const sss = parseFloat(document.getElementById('swal-16').value) || 0;
        const ph = parseFloat(document.getElementById('swal-17').value) || 0;
        const pi = parseFloat(document.getElementById('swal-18').value) || 0;
        const tax = parseFloat(document.getElementById('swal-19').value) || 0;
        
        const estGross = (hourlyRate * 8 * 26) + (honoPerCutoff * 2);
        const totalDeds = sss + ph + pi + tax;
        const impact = estGross > 0 ? (totalDeds / estGross) * 100 : 0;

        document.getElementById('live-name').innerText = name;
        document.getElementById('live-id').innerText = "EMP SERIAL: " + (document.getElementById('swal-0').value || "---");
        document.getElementById('live-salary').innerText = "₱ " + estGross.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('live-dept').innerText = document.getElementById('swal-2').value || "---";
        document.getElementById('live-pos').innerText = document.getElementById('swal-3').value || "---";
        document.getElementById('salary-bar').style.width = Math.min(impact, 100) + "%";
        document.getElementById('live-impact').innerText = impact.toFixed(1) + "%";
      };

      window.jump = (s) => {
        window.cur = s;
        document.querySelectorAll('.step-panel').forEach((p, i) => p.classList.toggle('active', i === s-1));
        document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === s-1));
        document.getElementById('step-text').innerText = `Step ${s} of 3`;
        document.getElementById('main-btn').innerHTML = s === 3 ? 'Finalize & Sync <i class="bi bi-cloud-arrow-up ms-2"></i>' : 'Next Segment <i class="bi bi-arrow-right ms-2"></i>';
      };

      window.handleFlow = () => {
        if(window.cur < 3) jump(window.cur + 1);
        else Swal.clickConfirm();
      };

      calcLive();
    },
    preConfirm: () => {
      let res = [];
      // Loop hanggang 20 para makuha ang index 20 (Exempted field)
      for(let i=0; i<=20; i++) { 
        let el = document.getElementById(`swal-${i}`);
        if (i === 20) {
          // Kunin ang "EXEMPTED" text kung naka-check ang switch
          res.push(el && el.checked ? "EXEMPTED" : "NONE");
        } else {
          res.push(el ? el.value : "");
        }
      }
      return res;
    }
  });

  if (formValues) {
    Swal.fire({ title: 'Processing Transaction...', didOpen: () => Swal.showLoading() });
    google.script.run.withSuccessHandler(() => {
      Swal.fire({ icon: 'success', title: 'Ledger Updated', timer: 1500, showConfirmButton: false });
      loadSettings();
    }).saveEmployee(...formValues);
  }
}

  function editEmployee(id) {
    const emp = globalSettings.find(r => r[0] == id);
    if (emp) showAddEmployeeModal(emp);
  }

  function deleteEmployee(name) {
    Swal.fire({
      title: 'Are you sure?',
      text: `You are about to delete ${name}. This action cannot be reversed!`,
      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#dc3545',
      confirmButtonText: 'Yes, Delete'
    }).then((result) => {
      if (result.isConfirmed) {
        google.script.run.withSuccessHandler(() => {
          Swal.fire('Deleted!', 'Record removed.', 'success');
          loadSettings();
        }).deleteEmployeeFromSheet(name);
      }
    });
  }
  function formatTimeForInput(timeString) {
  if (!timeString) return "";
  
  // Kung ang format ay "8:30 AM" o "5:30 PM"
  const date = new Date("2000/01/01 " + timeString);
  if (isNaN(date.getTime())) return timeString; // Return as is kung 24h na siya
  
  const hh = date.getHours().toString().padStart(2, '0');
  const mm = date.getMinutes().toString().padStart(2, '0');
  return hh + ":" + mm; // Lalabas na "08:30" o "17:30" na readable ng browser
}

  // ==========================================
  // 3. PAYROLL PROCESSING
  // ==========================================
  function initFilters() {
    google.script.run.withSuccessHandler(list => {
      // Siguraduhin na ang ID na ito ay tugma sa HTML mo
      const select = document.getElementById('empFilter'); 
      if(!select) return;
      let options = '<option value="ALL">ALL EMPLOYEES</option>';
      list.forEach(name => { options += `<option value="${name}">${name}</option>`; });
      select.innerHTML = options;
    }).getEmployeeList();
  }

  function handlePeriodChange() {
    const period = document.getElementById('cutoffPeriod').value;
    const startInput = document.getElementById('dateStart');
    const endInput = document.getElementById('dateEnd');
    const today = new Date();
    const year = today.getFullYear();
    const month = today.getMonth();

    if (period === "1") {
        startInput.value = `${year}-${String(month + 1).padStart(2, '0')}-01`;
        endInput.value = `${year}-${String(month + 1).padStart(2, '0')}-15`;
        startInput.style.display = "none"; endInput.style.display = "none";
    } else if (period === "2") {
        const lastDay = new Date(year, month + 1, 0).getDate();
        startInput.value = `${year}-${String(month + 1).padStart(2, '0')}-16`;
        endInput.value = `${year}-${String(month + 1).padStart(2, '0')}-${lastDay}`;
        startInput.style.display = "none"; endInput.style.display = "none";
    } else if (period === "custom") {
        startInput.style.display = "block"; endInput.style.display = "block";
    }
  }

  function loadData() {
    const start = document.getElementById('dateStart').value;
    const end = document.getElementById('dateEnd').value;
    const emp = document.getElementById('empFilter').value || "ALL";

    if (!start || !end) {
        Swal.fire("Incomplete", "Please select a date range first.", "info");
        return;
    }

    // Sa halip na Swal.showLoading na nakakaharang, 
    // palitan lang natin ang text ng button o lagyan ng small spinner sa table
    const summaryBody = document.getElementById('summaryBody');
    summaryBody.innerHTML = '<tr><td colspan="7" class="text-center py-5"><div class="spinner-border text-primary"></div><br>Calculating...</td></tr>';

    google.script.run
      .withSuccessHandler(res => {
        updateDashboard(res);
      })
      .getHRReport(start, end, emp);
}

function updateDashboard(res) {
    const summaryBody = document.getElementById('summaryBody');
    if (!summaryBody || !res.empList) return;

    let tGross = 0, tDed = 0, tNet = 0;

    const newContent = res.empList.map(emp => {
        const totalEmpDed = (emp.totalDed + emp.totalFixedDeductions + (emp.totalLeavePay || 0));
        
        tGross += emp.totalEarnings;
        tDed += totalEmpDed;
        tNet += emp.finalNetPay;

        const leaveInfo = emp.leaveDays > 0 
            ? `<div class="small text-danger fw-bold">${emp.leaveDays} Day(s)</div>
               <div class="tiny text-muted">${emp.leaveType || 'Leave'}</div>`
            : `<div class="text-muted">-</div>`;

        return `
            <tr onclick='showPayslip(${JSON.stringify(emp)})' style="cursor:pointer" class="text-center align-middle">
                <td class="ps-4 text-start"> <b>${emp.name}</b><br>
                    <span class="tiny text-muted">${emp.id || 'N/A'}</span>
                </td>
                <td>${emp.days}</td>
                <td>${leaveInfo}</td>

function loadAttendanceTab(isSilent = false) {
    const tableBody = document.getElementById('tableBody');
    
    // 1. INSTANT UI: If we have cached data, show it immediately 
    // This removes the "Fetching..." flicker when switching back to the tab
    if (attendanceCache && (tableBody.innerHTML === "" || tableBody.innerHTML.includes('spinner-border'))) {
        renderAttendanceRows(attendanceCache);
    } 
    // Only show the spinner if there is absolutely no data and it's not a silent refresh
    else if (!isSilent && !attendanceCache) {
        tableBody.innerHTML = `<tr><td colspan="7" class="text-center py-5"><div class="spinner-border text-primary spinner-border-sm"></div><span class="ms-2 text-muted">Connecting...</span></td></tr>`;
    }

    const start = document.getElementById('dateStartLogs').value;
    const end = document.getElementById('dateEndLogs').value;
    const empFilter = document.getElementById('empFilter')?.value || "ALL";

    google.script.run.withSuccessHandler(res => {
        if (!res || !res.details) return;

        // 2. BACKGROUND UPDATE: Only update the DOM if the data has actually changed
        // This prevents the table from "jumping" if the data is the same
        const newDataString = JSON.stringify(res.details);
        if (attendanceCache !== newDataString) {
            attendanceCache = newDataString; 
            renderAttendanceRows(res.details);
        }
    }).getHRReport(start, end, empFilter);
}

function renderAttendanceRows(details) {

    const newRows = details.map(log => {
        const isMissing = log.in === 'MISSING' || log.out === 'MISSING';
        let statusClass = log.status === 'FIXED' ? 'status-fixed' : (isMissing ? 'status-missing' : 'status-present');
        
        return `

                    <span class="${log.out === 'MISSING' ? 'text-danger fw-bold italic' : 'text-danger fw-bold'}">${log.out}</span>
                </td>
                <td class="text-center">
                    <div class="text-muted small mx-auto" style="max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                        ${log.remarks || '—'}

                    </div>

            </tr>`;
    }).join('');

    tableBody.innerHTML = newRows;

function editLogRow(date, name) {
    // 1. Reference the specific row
    const row = Array.from(document.querySelectorAll('#tableBody tr')).find(r => r.innerText.includes(name) && r.innerText.includes(date));
    
    // Get raw text from cells (Cell 3 is IN, Cell 4 is OUT)
    let rawIn = row ? row.cells[3].innerText.trim() : "MISSING";
    let rawOut = row ? row.cells[4].innerText.trim() : "MISSING";

    // 2. Determine if it is MISSING (Checkbox Logic)
    // If it says "MISSING" or is empty or has a dash, we CHECK the box
    const checkIn = (rawIn.includes("MISSING") || rawIn === "—" || rawIn === "");
    const checkOut = (rawOut.includes("MISSING") || rawOut === "—" || rawOut === "");

    // 3. Formatting the time for the input field
    // If it's missing, we want the input to be empty ("")
    const timeInValue = checkIn ? "" : convertTo24Hour(rawIn);
    const timeOutValue = checkOut ? "" : convertTo24Hour(rawOut);

    Swal.fire({
        title: '<span class="fw-bold text-primary">Adjust Attendance</span>',
        width: '550px',
        background: '#f8faff',
        showCancelButton: true,
        confirmButtonText: 'Confirm Changes',
        confirmButtonColor: '#4f46e5',
        html: `
            <div class="text-start mt-3">
                <div class="p-3 mb-3 bg-white rounded-3 border shadow-sm border-primary">
                    <div class="small text-muted text-uppercase fw-bold">Employee</div>
                    <div class="fs-5 fw-bold text-dark">${name}</div>
                    <div class="small text-primary"><i class="bi bi-calendar-event"></i> ${date}</div>

// Helper function to handle "05:30 PM" -> "17:30" conversion for HTML time inputs
function convertTo24Hour(timeStr) {
    if (!timeStr || timeStr.includes("MISSING")) return "";
    const [time, modifier] = timeStr.split(' ');
    let [hours, minutes] = time.split(':');
    if (hours === '12') hours = '00';
    if (modifier === 'PM') hours = parseInt(hours, 10) + 12;
    return `${hours.toString().padStart(2, '0')}:${minutes}`;
}

async function bulkAdjustment() {
    const tableRows = Array.from(document.querySelectorAll('#tableBody tr'));
    const visibleNames = tableRows.map(row => row.querySelector('b') ? row.querySelector('b').innerText.trim() : "");
    const exemptedEmployees = tableRows.filter(row => row.innerText.includes('EXEMPTED')).map(row => row.querySelector('b') ? row.querySelector('b').innerText.trim() : "");

    const { value: formValues } = await Swal.fire({
        title: '<i class="bi bi-lightning-charge-fill me-2"></i>Attendance Adjustment',
        width: '700px',
        background: '#fffbeb',
        backdrop: 'rgba(0,0,0,0.4)',
        customClass: { container: 'swal-blur-bg' },
        confirmButtonColor: '#f59e0b',
        confirmButtonText: 'Apply to Selected',
        showCancelButton: true,
        showClass: { popup: '', backdrop: '' },
        hideClass: { popup: '', backdrop: '' },
        html: `
            <div class="text-start px-2 mt-2">
                <div class="row mb-4 align-items-end">
                    <div class="col-6">
                        <label class="form-label small fw-bold text-muted">INCIDENT DATE</label>
                        <input type="date" id="bulk-date" class="form-control border-warning bg-white" value="${document.getElementById('dateStartLogs').value}">
                    </div>
                    <div class="col-6 text-end">
                        <div class="btn-group shadow-sm">
                            <button type="button" class="btn btn-sm btn-light border" onclick="toggleBulkSelect(true)">Check All</button>
                            <button type="button" class="btn btn-sm btn-light border text-danger" onclick="toggleBulkSelect(false)">Clear</button>
                        </div>
                    </div>
                </div>

                <div class="employee-list-grid border rounded-4 p-3 bg-white shadow-sm" style="max-height: 220px; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                    ${cachedEmployeeList.map(e => {
                        const isVisible = visibleNames.includes(e);
                        const isExempted = exemptedEmployees.includes(e);
                        const shouldCheck = isVisible && !isExempted;
                        return `
                        <div class="form-check p-2 border rounded-3 ${!isVisible ? 'bg-light opacity-50' : (isExempted ? 'bg-light' : 'bg-white shadow-sm')}">
                            <input class="form-check-input bulk-check ms-0 me-2" type="checkbox" value="${e}" id="chk-${e}" ${shouldCheck ? 'checked' : ''}>
                            <label class="form-check-label fw-bold small ${!isVisible || isExempted ? 'text-muted' : 'text-dark'}" for="chk-${e}">
                                ${e} 
                                ${!isVisible ? '<span class="badge bg-danger ms-1" style="font-size:10px">ABSENT</span>' : ''}
                            </label>
                        </div>`;
                    }).join('')}
                </div>

                <div class="row g-3 mt-3">
                    <div class="col-12">
                        <div class="p-3 rounded-4 border-dashed bg-white shadow-sm" style="border: 2px dashed #f59e0b;">
                             <label class="form-label small fw-bold text-warning mb-2">TIME SELECTION (Toggle what to fix)</label>
                             <div class="d-flex gap-3">
                                <div class="w-50 text-center border-end">
                                    <div class="form-check form-switch d-inline-block">
                                        <input class="form-check-input" type="checkbox" id="bulk-enable-in" checked 
                                            onchange="document.getElementById('bulk-in').disabled = !this.checked">
                                        <label class="form-check-label small fw-bold text-success">TIME IN</label>
                                    </div>
                                    <input type="time" id="bulk-in" class="form-control form-control-sm border-0 bg-transparent text-center fs-5 fw-bold" value="08:30">
                                </div>
                                <div class="w-50 text-center">
                                    <div class="form-check form-switch d-inline-block">

                                            onchange="document.getElementById('bulk-out').disabled = !this.checked">

                                    </div>
                                    <input type="time" id="bulk-out" class="form-control form-control-sm border-0 bg-transparent text-center fs-5 fw-bold" value="17:30">
                                </div>
                             </div>
                        </div>
                    </div>
                    <div class="col-12">
                        <label class="form-label small fw-bold text-muted">AUTO-REMARK REASON</label>
                        <select id="bulk-remark-select" class="form-select shadow-none border-warning bg-white">

                            <option value="INTERNET OUTAGE">INTERNET OUTAGE</option>
                        </select>

                </div>
            </div>

        preConfirm: () => {
            const selected = Array.from(document.querySelectorAll('.bulk-check:checked')).map(cb => cb.value);

            return {

        }).saveBulkLogs(formValues.employees, formValues.date, formValues.in, formValues.out, formValues.remark);
    }
}

// Helper Functions
function toggleManualRemark(val) {
  const manualInput = document.getElementById('bulk-remark-manual');
  manualInput.classList.toggle('d-none', val !== "OTHERS");
}

function toggleBulkSelect(shouldCheck) {
  document.querySelectorAll('.bulk-check').forEach(cb => {
    // Hindi pa rin mag-che-check ang exempted kahit mag-Select All
    if (shouldCheck && cb.getAttribute('data-exempted') === "true") {
      cb.checked = false;
    } else {
      cb.checked = shouldCheck;
    }
  });
}
